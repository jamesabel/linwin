name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync

      # The test_rdp_* modules need a live WSL2 distro to clone, which
      # GitHub runners don't have — they run locally (see CLAUDE.md).
      - name: Run tests (mocked suite)
        run: >
          uv run python -m pytest tests/ -v
          --ignore=tests/test_rdp_desktop.py
          --ignore=tests/test_rdp_lifecycle.py
          --ignore=tests/test_rdp_login.py
          --ignore=tests/test_rdp_session.py
          --cov=linwin --cov-report=term
